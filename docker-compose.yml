services:
  autoposting:
    build: .
    image: autoposting:latest
    container_name: autoposting
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs');const p='/app/data/.instance.lock';if(!fs.existsSync(p))process.exit(1);const pid=Number(fs.readFileSync(p,'utf8').trim());try{process.kill(pid,0);}catch(e){if(e.code==='ESRCH')process.exit(1);}process.exit(0);",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
